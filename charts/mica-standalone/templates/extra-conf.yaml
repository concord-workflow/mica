apiVersion: v1
kind: ConfigMap
metadata:
  name: mica-extra-conf
  labels:
    {{- include "mica-standalone.labels" . | nindent 4 }}
data:
  extra.conf: |-
    mica {
      git {
        {{- if .Values.mica.git.defaultAuthToken }}
        oauth = "{{ .Values.mica.git.defaultAuthToken }}"
        {{- end }}
      }

      {{- if .Values.mica.github.appInstallation.auth }}
      github {
        appInstallation {
          auth = [
            {{- range $index, $entry := .Values.mica.github.appInstallation.auth }}
            {
              id = "{{ $entry.id }}"
              type = "{{ $entry.type }}"
              urlPattern = "{{ $entry.urlPattern }}"
              {{- if $entry.apiUrl }}
              apiUrl = "{{ $entry.apiUrl }}"
              {{- end }}
              {{- if $entry.clientId }}
              clientId = "{{ $entry.clientId }}"
              {{- end }}
              {{- if $entry.privateKeyPath }}
              privateKey = "{{ $entry.privateKeyPath }}"
              {{- end }}
              {{- if $entry.token }}
              token = "{{ $entry.token }}"
              {{- end }}
              {{- if $entry.username }}
              username = "{{ $entry.username }}"
              {{- end }}
            }
            {{- end }}
          ]
        }
      }
      {{- end }}

      oidc {
        teamMapping = {
          {{- range $teamId, $team := .Values.mica.oidc.teamMapping }}
          "{{ $teamId }}" {
            source = [
              {{- range $index, $source := $team.source }}
              "{{ $source }}"{{ if ne $index (sub (len $team.source) 1) }},{{ end }}
              {{- end }}
            ]
            role = "{{ $team.role }}"
          }{{ if ne $teamId (last (keys $.Values.mica.oidc.teamMapping)) }},{{ end }}
          {{- end }}
        }

        roleMapping = {
          {{- range $role, $mapping := .Values.mica.oidc.roleMapping }}
          "{{ $role }}" {
            source = [
              {{- range $index, $source := $mapping.source }}
              "{{ $source }}"{{ if ne $index (sub (len $mapping.source) 1) }},{{ end }}
              {{- end }}
            ]
          }{{ if ne $role (last (keys $.Values.mica.oidc.roleMapping)) }},{{ end }}
          {{- end }}
        }
      }
    }
